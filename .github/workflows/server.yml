name: AllMusic Server

on:
  push:
    branches:    
      - 'releases/**'
    tags:        
      - '*'
  workflow_dispatch:  # 👈 添加这一行就可以手动执行了
    inputs:
      build_all:
        description: '构建所有版本'
        required: false
        default: true
        type: boolean

jobs:
  build_forge_1_20_1:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'true'
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3 # v3.1.0
    - name: build
      shell: cmd
      run: |
        link.cmd && cd forge_1_20_1 && gradlew build
    - name: update
      uses: actions/upload-artifact@v4
      with:
        name: "allmusic_server_forge_1_20_1"
        path: build/libs/
